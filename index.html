<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專屬運動處方互動指南</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 設定模組引入路徑，確保 React 版本一致 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
  
  <!-- 載入 Babel 即時編譯器 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Activity, HeartPulse, ArrowRight, ChevronRight, Info, 
      Target, Flame, Play, Edit3, Award, Utensils, BookOpen, 
      ArrowLeft, Ticket, LayoutGrid, CheckCircle2, RefreshCw, 
      Facebook, Instagram, MessageCircle, ExternalLink 
    } from 'lucide-react';

    function App() {
      const [step, setStep] = useState('intro');
      const [formData, setFormData] = useState({ height: '', weight: '', fitness: 'good' });
      const [result, setResult] = useState(null);
      const [toast, setToast] = useState('');

      const [userData, setUserData] = useState({
        totalMinutes: 0,
        streak: 0,
        lastActiveDate: null,
        contract: { trigger: '', action: '' },
        bingoBoard: Array(9).fill(false)
      });

      const [dashboardView, setDashboardView] = useState('menu');

      const [bentoState, setBentoState] = useState({
        aerobic: '',
        resistance1: '',
        resistance2: '',
        hiit1: '',
        hiit2: ''
      });

      const [showCheatSheet, setShowCheatSheet] = useState(false);
      
      const [contractForm, setContractForm] = useState({
        trigger: '洗澡前',
        action: '10下深蹲',
        customTrigger: '',
        customAction: ''
      });

      const quickExercises = [
        '原地甩手', '靠牆深蹲', '高抬腿原地走', '開合跳', '平板支撐',
        '深蹲跳', '屈膝伏地挺身', '爬樓梯', '波比跳', '空中腳踏車'
      ];
      const [currentQuick, setCurrentQuick] = useState('點擊下方按鈕抽籤');
      const [isDrawing, setIsDrawing] = useState(false);
      const [hasDrawn, setHasDrawn] = useState(false);

      useEffect(() => {
        const saved = localStorage.getItem('workout_tracker_data');
        if (saved) {
          setUserData(JSON.parse(saved));
        }
      }, []);

      const saveUserData = (newData) => {
        setUserData(newData);
        localStorage.setItem('workout_tracker_data', JSON.stringify(newData));
      };

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(''), 3000);
      };

      const calculatePrescription = () => {
        const h = parseFloat(formData.height) / 100;
        const w = parseFloat(formData.weight);
        if (!h || !w) return;

        const bmi = w / (h * h);
        let type = '';
        let title = '';
        let description = '';

        if (bmi < 18.5) {
          type = 'underweight';
          title = '增肌養成處方';
          description = '目前的重點是慢慢把肌肉量養起來，不要做太多會大量消耗熱量的運動，把營養留給肌肉生長就好。';
        } else if (bmi >= 18.5 && bmi < 24) {
          type = 'normal';
          title = '體態維持處方';
          description = '你的基礎非常好！現在只要維持心肺健康跟肌肉彈性，讓代謝功能保持在最佳狀態就可以了。';
        } else {
          type = 'overweight';
          title = '減脂代謝處方';
          description = '我們來幫身體創造一點熱量赤字，搭配多樣化的運動來燃燒脂肪，這對改善整體健康非常有幫助。';
        }

        setResult({ bmi: bmi.toFixed(1), type, title, description, fitness: formData.fitness });
        setStep('result');
        setDashboardView('menu');
      };

      const addExerciseMinutes = (mins) => {
        const today = new Date().toDateString();
        let newData = { ...userData };
        
        if (newData.lastActiveDate !== today) {
          newData.streak += 1;
          newData.lastActiveDate = today;
          newData.bingoBoard = Array(9).fill(false);
        }
        
        newData.totalMinutes += mins;
        saveUserData(newData);
        showToast(`超棒的！成功累積 ${mins} 分鐘運動量`);
      };

      const renderIntro = () => (
        <div className="flex flex-col items-center justify-center text-center space-y-6 animate-in fade-in duration-500">
          <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mb-4">
            <Activity className="w-10 h-10 text-blue-600" />
          </div>
          <h1 className="text-3xl font-bold text-gray-800">找到你的專屬運動處方</h1>
          <p className="text-gray-600 max-w-md leading-relaxed">
            其實我們都知道要運動，但就是很難開始。花個一分鐘回答幾個問題，我們幫你準備了一套不會太累又有成就感的日常訓練計畫。
          </p>
          <button 
            onClick={() => setStep('assessment')}
            className="mt-8 px-8 py-3 bg-blue-600 text-white rounded-full font-medium hover:bg-blue-700 transition-colors flex items-center gap-2"
          >
            馬上開始 <ArrowRight className="w-4 h-4" />
          </button>
        </div>
      );

      const renderAssessment = () => (
        <div className="max-w-md mx-auto space-y-8 animate-in slide-in-from-right duration-500">
          <div className="text-center mb-8">
            <h2 className="text-2xl font-bold text-gray-800">了解你的身體現況</h2>
            <p className="text-gray-500 mt-2">請放心，這些資料只會存在你的手機或電腦裡。</p>
          </div>

          <div className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">身高 (公分)</label>
              <input 
                type="number" 
                value={formData.height}
                onChange={(e) => setFormData({...formData, height: e.target.value})}
                className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="例如: 170"
              />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">體重 (公斤)</label>
              <input 
                type="number" 
                value={formData.weight}
                onChange={(e) => setFormData({...formData, weight: e.target.value})}
                className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="例如: 65"
              />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">平時爬兩層樓梯會覺得很喘嗎？</label>
              <div className="flex gap-4">
                <button 
                  onClick={() => setFormData({...formData, fitness: 'poor'})}
                  className={`flex-1 py-3 rounded-xl border transition-all ${formData.fitness === 'poor' ? 'bg-blue-50 border-blue-500 text-blue-700 font-medium' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}`}
                >
                  會滿喘的
                </button>
                <button 
                  onClick={() => setFormData({...formData, fitness: 'good'})}
                  className={`flex-1 py-3 rounded-xl border transition-all ${formData.fitness === 'good' ? 'bg-blue-50 border-blue-500 text-blue-700 font-medium' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}`}
                >
                  覺得滿輕鬆
                </button>
              </div>
            </div>
          </div>

          <button 
            onClick={calculatePrescription}
            disabled={!formData.height || !formData.weight}
            className="w-full py-4 bg-gray-900 text-white rounded-xl font-medium disabled:opacity-50 hover:bg-gray-800 transition-colors"
          >
            查看我的處方
          </button>
        </div>
      );

      const renderResult = () => {
        const renderAdvice = () => {
          if (result.type === 'underweight') {
            return (
              <ul className="space-y-3 text-gray-600 mt-4 text-left mx-auto max-w-md">
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>阻力訓練最重要：</strong>每週安排 2 到 3 天，幫助肌肉生長，這是你現在的首要任務。</div></li>
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>適度有氧就好：</strong>每週大概 150 分鐘，維持基本心肺功能，不要做過度消耗熱量的長跑。</div></li>
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>運動零食與 HIIT：</strong>多利用零碎時間活動筋骨，但暫時不需要做太激烈的 HIIT 高強度間歇。</div></li>
              </ul>
            );
          } else if (result.type === 'normal') {
            return (
              <ul className="space-y-3 text-gray-600 mt-4 text-left mx-auto max-w-md">
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>有氧運動打底：</strong>每週累積 150 到 300 分鐘，快走或騎腳踏車都很棒。</div></li>
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>阻力訓練維持：</strong>每週 2 到 3 天，鍛鍊主要肌群，不讓肌肉流失。</div></li>
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>加入 HIIT 與零食：</strong>體力好時可以穿插 HIIT 挑戰自己，平時久坐記得配一點運動零食。</div></li>
              </ul>
            );
          } else {
            return (
              <ul className="space-y-3 text-gray-600 mt-4 text-left mx-auto max-w-md">
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>有氧運動燃脂：</strong>每週累積 150 到 300 分鐘，這是消滅脂肪的穩固基礎。</div></li>
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>阻力訓練加持：</strong>每週 2 到 3 天，把肌肉養起來能幫你提高基礎代謝，自動消耗更多熱量。</div></li>
                <li className="flex items-start gap-2"><CheckCircle2 className="w-5 h-5 text-green-500 shrink-0 mt-0.5"/> <div><strong>HIIT 與零食特攻：</strong>每週 1 到 2 次的 HIIT 對改善代謝非常有效；每 1 到 2 小時起來動一下的運動零食更是關鍵。</div></li>
              </ul>
            );
          }
        };

        return (
          <div className="max-w-2xl mx-auto space-y-8 animate-in zoom-in-95 duration-500 text-center">
            <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
              <HeartPulse className="w-12 h-12 text-blue-500 mx-auto mb-4" />
              <h2 className="text-sm font-bold tracking-wider text-blue-600 uppercase mb-2">專屬處方箋</h2>
              <h3 className="text-3xl font-bold text-gray-900 mb-4">{result.title}</h3>
              <p className="text-lg text-gray-600 mb-6">{result.description}</p>
              
              <div className="inline-flex items-center gap-4 bg-gray-50 px-6 py-3 rounded-full mb-8">
                <span className="text-gray-500">你的 BMI 數值：</span>
                <span className="text-2xl font-bold text-gray-900">{result.bmi}</span>
              </div>

              <div className="border-t border-gray-100 pt-6">
                <h4 className="text-lg font-bold text-gray-800 mb-2">每週運動分配建議</h4>
                {renderAdvice()}
              </div>
            </div>

            <button 
              onClick={() => setStep('dashboard')}
              className="w-full py-4 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition-colors flex items-center justify-center gap-2"
            >
              進入每日運動儀表板 <ChevronRight className="w-5 h-5" />
            </button>
          </div>
        );
      };

      const renderDashboard = () => {
        const bingoItems = [
          '走樓梯代替電梯', '久坐站起來伸展', '看電視原地踏步', 
          '提早一站下車走路', '自己動手做家事', '睡前深呼吸3次', 
          '喝滿1500cc水', '做10個深蹲', '站著工作10分鐘'
        ];

        const contractActionOptions = [
          "10下深蹲", "30秒棒式", "原地踏步兩分鐘", "伸展肩頸", "15下開合跳",
          "靠牆深蹲30秒", "爬兩層樓梯", "10下扶牆伏地挺身", "原地甩手100下", "喝500cc溫水並拉筋"
        ];

        const exerciseDB = {
          aerobic: [
            { id: '', name: '不挑選', mins: 0, desc: '', howTo: '' },
            { id: 'a1', name: '快走', mins: 15, desc: '15 分鐘', howTo: '維持微喘但還能說出完整句子的速度，雙手自然大幅擺動。' },
            { id: 'a2', name: '平躺踩雙腳', mins: 10, desc: '10 分鐘', howTo: '躺在床上或瑜珈墊上，雙腳抬起像騎腳踏車一樣在空中畫圈。' },
            { id: 'a3', name: '原地慢跑', mins: 20, desc: '20 分鐘', howTo: '在家看電視時原地小跑步，重點是腳步放輕，手肘彎曲前後擺動。' },
            { id: 'a4', name: '原地甩手', mins: 15, desc: '15 分鐘', howTo: '雙腳與肩同寬，雙手平舉到胸前再往後甩，搭配膝蓋微彎，保持規律節奏。' }
          ],
          resistance: [
            { id: '', name: '不挑選', mins: 0, desc: '', howTo: '' },
            { id: 'r1', name: '徒手: 雙臂吊撐', mins: 10, desc: '3回合，每次5到15秒', howTo: '雙手前臂平放在地，雙腳往後踩直，身體從頭到腳像木板一樣平直，收緊核心。' },
            { id: 'r2', name: '徒手: 伏地挺身', mins: 10, desc: '3回合，每次30到60秒', howTo: '雙手比肩膀微寬撐地，肚子收緊不塌腰，胸口靠近地面再推起(可選擇屈膝或不屈膝)。' },
            { id: 'r3', name: '徒手: 雙臂後撐挺身', mins: 10, desc: '3回合，每次30到60秒', howTo: '背對穩固的椅子，雙手往後撐住邊緣。手肘彎曲讓身體下沉，再用力撐起。' },
            { id: 'r4', name: '徒手: 引體向上', mins: 10, desc: '3回合，每次3到4下', howTo: '找穩固的單槓，雙手比肩寬握住，將身體往上拉直到下巴超過單槓。' },
            { id: 'r5', name: '徒手: 肩膀伏地挺身', mins: 10, desc: '3回合，每次30到60秒', howTo: '呈倒V字型(下犬式)撐地，彎曲手肘讓頭部靠近地面，再用力推起。' },
            { id: 'r6', name: '徒手: 雙臂側平舉前後轉', mins: 10, desc: '3回合，每次30到60秒', howTo: '雙手向兩側平舉，小幅度往前畫圈，再往後畫圈，感受肩膀發力。' },
            { id: 'r7', name: '徒手: 深蹲', mins: 10, desc: '3回合，每次30到60秒', howTo: '雙腳與肩同寬，屁股往後坐，背部挺直，站起時大腿與臀部發力。' },
            { id: 'r8', name: '啞鈴: 二頭肌彎舉', mins: 10, desc: '3回合，5到15RM', howTo: '手持啞鈴垂於兩側，手肘固定在腰際，將啞鈴向上彎舉靠近肩膀。' },
            { id: 'r9', name: '啞鈴: 三頭肌伸展', mins: 10, desc: '3回合，5到15RM', howTo: '雙手握住一個啞鈴舉過頭頂，彎曲手肘讓啞鈴下放到腦後，再用力伸直。' },
            { id: 'r10', name: '啞鈴: 胸大肌推舉', mins: 10, desc: '3回合，5到15RM', howTo: '平躺，雙手持啞鈴在胸口兩側，將啞鈴垂直往上推舉直到手臂伸直。' },
            { id: 'r11', name: '啞鈴: 後肩飛鳥', mins: 10, desc: '3回合，5到15RM', howTo: '身體微前傾，雙手拿啞鈴自然下垂，手肘微彎，往兩側上方提起至肩膀高度。' },
            { id: 'r12', name: '啞鈴: 負重深蹲', mins: 10, desc: '3回合，5到15RM', howTo: '雙手拿著啞鈴或踩著彈力帶，保持背部挺直進行深蹲動作。' },
            { id: 'r13', name: '機械: 前手臂彎舉', mins: 10, desc: '3回合，5到12次', howTo: '使用健身房二頭肌訓練機，調整好重量後進行彎舉。' },
            { id: 'r14', name: '機械: 雙臂下拉', mins: 10, desc: '3回合，5到12次', howTo: '使用滑輪下拉機，挺胸收背，將握把往胸口方向拉下。' },
            { id: 'r15', name: '機械: 雙臂內收', mins: 10, desc: '3回合，5到12次', howTo: '使用夾胸機(蝴蝶機)，感受胸肌出力將手把往中間夾緊。' },
            { id: 'r16', name: '機械: 雙臂外展', mins: 10, desc: '3回合，5到12次', howTo: '使用反向蝴蝶機，感受後三角肌出力將手把往外打開。' },
            { id: 'r17', name: '機械: 平推舉', mins: 10, desc: '3回合，5到12次', howTo: '使用胸推機，背部貼緊椅背，將握把往前推直再慢慢放回。' }
          ],
          hiit: [
            { id: '', name: '不挑選', mins: 0, desc: '', howTo: '' },
            { id: 'h1', name: '深蹲', mins: 3, desc: '做60秒，休2到3分', howTo: '用較快的節奏連續進行深蹲，把心跳率拉高到微喘的程度。' },
            { id: 'h2', name: '開合跳', mins: 3, desc: '做60秒，休2到3分', howTo: '雙腳跳開時雙手在頭頂擊掌，跳回併攏時雙手拍大腿兩側。' },
            { id: 'h3', name: '伏地挺身', mins: 3, desc: '做60秒，休2到3分', howTo: '連續動作，做不起來可以用膝蓋著地的方式撐完60秒。' },
            { id: 'h4', name: '原地跑', mins: 3, desc: '做60秒，休2到3分', howTo: '像是在原地衝刺一樣，雙手跟雙腳快速擺動交替。' },
            { id: 'h5', name: '側跳', mins: 3, desc: '做60秒，休2到3分', howTo: '雙腳併攏，想像地上有一條線，左右來回快速跳躍。' },
            { id: 'h6', name: '平板', mins: 3, desc: '做60秒，休2到3分', howTo: '核心收緊，身體保持一直線撐住60秒。' },
            { id: 'h7', name: '趴地爬山', mins: 3, desc: '做60秒，休2到3分', howTo: '雙手撐地的伏地挺身姿勢，膝蓋輪流往胸口快速收緊。' },
            { id: 'h8', name: '波比跳', mins: 3, desc: '做60秒，休2到3分', howTo: '站立狀態蹲下，雙手撐地後雙腳往後跳，再跳回胸前，最後往上跳起。' },
            { id: 'h9', name: '分腿跳', mins: 3, desc: '做60秒，休2到3分', howTo: '雙腳前後站立往下蹲(弓箭步)，用力跳起在空中換腳落地。' },
            { id: 'h10', name: '高抬腿原地跑', mins: 3, desc: '做60秒，休2到3分', howTo: '原地快速跑步，膝蓋盡量往上抬高到腰部的位置。' }
          ]
        };

        const handleContractSave = (e) => {
          e.preventDefault();
          const finalTrigger = contractForm.trigger === 'custom' ? contractForm.customTrigger : contractForm.trigger;
          const finalAction = contractForm.action === 'custom' ? contractForm.customAction : contractForm.action;
          
          if (!finalTrigger || !finalAction) {
            showToast('約定內容要填寫完整才能生效喔！');

                           <div className="w-full flex flex-col gap-1 px-2">
                           {bentoState.hiit1 && <div className="font-bold text-gray-800 text-[10px] sm:text-xs truncate">{getOptionData('hiit', bentoState.hiit1)?.name}</div>}
                           {bentoState.hiit2 && <div className="font-bold text-gray-800 text-[10px] sm:text-xs truncate">{getOptionData('hiit', bentoState.hiit2)?.name}</div>}
                         </div>
                        ) : (
                          <span className="text-gray-400 text-[10px] sm:text-xs font-medium">來點健康澱粉</span>
                        )}
                      </div>
                    </div>
                  </div>
                </div>

                {getSelectedExercises().length > 0 && (
                  <div className="mt-8 mb-6">
                    <button 
                      onClick={() => setShowCheatSheet(!showCheatSheet)}
                      className="w-full flex items-center justify-center gap-2 py-3 px-4 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-medium"
                    >
                      <BookOpen className="w-5 h-5" /> 
                      {showCheatSheet ? '收起動作小抄' : '不知道動作怎麼做嗎？看小抄'}
                    </button>
                    
                    {showCheatSheet && (
                      <div className="mt-3 p-5 bg-gray-50 border border-gray-200 rounded-xl space-y-4 animate-in slide-in-from-top-2 duration-300">
                        {getSelectedExercises().map((ex, idx) => (
                          <div key={idx} className="border-b border-gray-200 pb-4 last:border-0 last:pb-0">
                            <div className="font-bold text-gray-800 text-lg mb-1">{ex.name}</div>
                            <div className="text-sm text-emerald-600 mb-2 font-medium bg-emerald-50 inline-block px-2 py-1 rounded">建議量: {ex.desc}</div>
                            <div className="text-base text-gray-600 leading-relaxed">{ex.howTo}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                <button
                  onClick={finishBento}
                  disabled={getBentoTotalMins() === 0}
                  className="w-full py-4 bg-gray-900 text-white rounded-xl font-bold text-lg disabled:opacity-50 hover:bg-gray-800 transition-colors mt-4"
                >
                  吃完餐盤並紀錄 ({getBentoTotalMins()} 分鐘)
                </button>
              </div>
            </div>
          );
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 text-gray-900 font-sans selection:bg-blue-200 relative flex flex-col">
          {toast && (
            <div className="fixed top-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-lg z-50 animate-in slide-in-from-top fade-in">
              {toast}
            </div>
          )}
          
          <main className="container mx-auto px-4 py-8 md:py-12 flex-grow">
            {step === 'intro' && renderIntro()}
            {step === 'assessment' && renderAssessment()}
            {step === 'result' && renderResult()}
            {step === 'dashboard' && renderDashboard()}
          </main>

          <footer className="text-center py-8 text-gray-500 text-sm mt-auto border-t border-gray-200">
            <p className="font-medium text-gray-600 mb-2">蕭宇超醫師製作 一起告別雲朵身材</p>
            
            <div className="flex items-center justify-center gap-5 mb-4">
              <a 
                href="https://www.facebook.com/share/1FoPpvVSZs/?mibextid=wwXIfr" 
                target="_blank" 
                rel="noopener noreferrer" 
                className="text-gray-400 hover:text-blue-600 transition-colors"
                title="Facebook 粉絲專頁"
              >
                <Facebook className="w-5 h-5" />
              </a>
              <a 
                href="https://www.instagram.com/goodbyecloudkids_drhsiao?igsh=cWhkZXhwcjNoZnpm&utm_source=qr" 
                target="_blank" 
                rel="noopener noreferrer" 
                className="text-gray-400 hover:text-pink-600 transition-colors"
                title="Instagram"
              >
                <Instagram className="w-5 h-5" />
              </a>
              <a 
                href="https://lin.ee/fAzcScx" 
                target="_blank" 
                rel="noopener noreferrer" 
                className="text-gray-400 hover:text-green-500 transition-colors flex items-center gap-1"
                title="Line 官方帳號"
              >
                <MessageCircle className="w-5 h-5" />
                <span className="font-medium">LINE</span>
              </a>
            </div>

            <p className="text-xs">
              資料參考來源：
              <a 
                href="https://cpd.moe.gov.tw/articleInfo?id=36599" 
                target="_blank" 
                rel="noopener noreferrer"
                className="text-blue-500 hover:text-blue-600 underline transition-colors ml-1"
              >
                教育部 邁向健康體位 從健康生活型態做起
              </a>
            </p>
          </footer>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
